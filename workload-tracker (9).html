<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workload Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F3EE;
    --surface: #FDFCF9;
    --card: #FFFFFF;
    --border: #E2DED6;
    --border-strong: #C8C2B8;
    --text-primary: #1A1714;
    --text-secondary: #6B6460;
    --text-muted: #9E9893;
    --accent: #2B4EFF;
    --accent-light: #EEF1FF;
    --red: #D43B3B;
    --red-light: #FDEAEA;
    --amber: #C07A1A;
    --amber-light: #FDF4E3;
    --green: #2D7A4F;
    --green-light: #E6F5ED;
    --blue: #1E5FAA;
    --blue-light: #E8F0FB;
    --col-todo: #EDE9E3;
    --col-doing: #FFF8EE;
    --col-done: #EDFAF3;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-md: 0 4px 12px rgba(0,0,0,.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans Thai', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── Header ── */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
  }
  .brand-icon svg { width: 15px; height: 15px; fill: #fff; }
  .brand-name { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* ── Controls ── */
  .controls {
    padding: 20px 28px 0;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  /* ── Stats ── */
  .stats {
    padding: 16px 28px;
    display: flex;
    gap: 10px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    flex: 1;
    min-width: 0;
  }
  .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; letter-spacing: -0.03em; }
  .stat-value.v-total { color: var(--text-primary); }
  .stat-value.v-todo { color: var(--blue); }
  .stat-value.v-doing { color: var(--amber); }
  .stat-value.v-done { color: var(--green); }

  /* ── Board ── */
  .board {
    padding: 0 28px 32px;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
  }

  .col {
    border-radius: var(--radius);
    padding: 14px;
    min-height: 400px;
  }
  .col-todo { background: var(--col-todo); }
  .col-doing { background: var(--col-doing); border: 1px solid #FFE8BB; }
  .col-done { background: var(--col-done); border: 1px solid #B8EDD1; }

  .col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .col-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .col-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }
  .dot-todo { background: var(--blue); }
  .dot-doing { background: var(--amber); }
  .dot-done { background: var(--green); }

  .col-count {
    font-size: 11px;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
    background: rgba(0,0,0,.07);
    border-radius: 999px;
    padding: 1px 8px;
    color: var(--text-secondary);
  }

  /* ── Task Card ── */
  .task-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s, border-color .15s;
    box-shadow: var(--shadow);
    animation: cardIn .2s ease;
  }
  @keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .task-card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .task-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .task-name { font-size: 13px; font-weight: 500; line-height: 1.4; flex: 1; }
  .task-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 8px; }
  .task-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .task-assignee { display: flex; align-items: center; gap: 5px; }
  .avatar {
    width: 20px; height: 20px;
    border-radius: 50%;
    font-size: 8px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .assignee-name { font-size: 11px; color: var(--text-secondary); }
  .task-due { font-size: 11px; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; }
  .task-due.overdue { color: var(--red); font-weight: 500; }

  /* ── Priority Badge ── */
  .priority {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 999px;
    flex-shrink: 0;
    letter-spacing: .03em;
    text-transform: uppercase;
  }
  .p-high { background: var(--red-light); color: var(--red); }
  .p-medium { background: var(--amber-light); color: var(--amber); }
  .p-low { background: var(--green-light); color: var(--green); }

  /* ── Empty State ── */
  .empty {
    text-align: center;
    padding: 32px 0;
    color: var(--text-muted);
    font-size: 12px;
  }
  .empty-icon { font-size: 28px; margin-bottom: 6px; opacity: .4; }

  /* ── Buttons ── */
  .btn {
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    background: var(--card);
    color: var(--text-primary);
    font-family: 'IBM Plex Sans Thai', sans-serif;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: background .15s;
  }
  .btn:hover { background: var(--bg); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: #1E3ECC; border-color: #1E3ECC; }
  .btn-danger { color: var(--red); border-color: #F5BFBF; }
  .btn-danger:hover { background: var(--red-light); }

  /* ── Select & Input ── */
  select, input, textarea {
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 7px 10px;
    font-size: 13px;
    background: var(--card);
    color: var(--text-primary);
    font-family: 'IBM Plex Sans Thai', sans-serif;
    outline: none;
    transition: border-color .15s;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,23,20,.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; animation: fadeIn .15s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 24px;
    width: 380px;
    max-width: 95vw;
    box-shadow: var(--shadow-md);
    animation: slideUp .2s ease;
  }
  @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; letter-spacing: -0.01em; }
  .form-group { margin-bottom: 10px; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 4px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  input[type="text"], input[type="date"], select, textarea { width: 100%; }
  .modal-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; }

  /* ── Add column button ── */
  .add-col-btn {
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 500;
    gap: 6px;
    transition: all .15s;
    background: transparent;
    min-height: 60px;
    margin-bottom: 8px;
  }
  .add-col-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  @media (max-width: 720px) {
    .board { grid-template-columns: 1fr; }
    .stats { flex-wrap: wrap; }
    .stats .stat-card { min-width: calc(50% - 5px); }
    .header, .controls, .stats, .board { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5" opacity=".4"/></svg>
    </div>
    <span class="brand-name">Workload Tracker</span>
  </div>
  <div class="header-actions">
    <select id="fp" style="font-size:12px;padding:5px 9px">
      <option value="">ทุก Priority</option>
      <option value="high">🔴 สูง</option>
      <option value="medium">🟡 กลาง</option>
      <option value="low">🟢 ต่ำ</option>
    </select>
    <select id="fa" style="font-size:12px;padding:5px 9px">
      <option value="">ทุก Assignee</option>
    </select>
    <button class="btn btn-primary" onclick="openAdd()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6.5" y1="1" x2="6.5" y2="12"/><line x1="1" y1="6.5" x2="12" y2="6.5"/></svg>
      เพิ่มงาน
    </button>
  </div>
</div>

<div class="stats">
  <div class="stat-card"><div class="stat-label">ทั้งหมด</div><div class="stat-value v-total" id="st">0</div></div>
  <div class="stat-card"><div class="stat-label">รอดำเนินการ</div><div class="stat-value v-todo" id="s1">0</div></div>
  <div class="stat-card"><div class="stat-label">กำลังทำ</div><div class="stat-value v-doing" id="s2">0</div></div>
  <div class="stat-card"><div class="stat-label">เสร็จแล้ว</div><div class="stat-value v-done" id="s3">0</div></div>
</div>

<div class="board">
  <div class="col col-todo">
    <div class="col-header">
      <div class="col-label"><span class="col-dot dot-todo"></span>รอดำเนินการ</div>
      <span class="col-count" id="c1">0</span>
    </div>
    <div id="k1"></div>
    <button class="add-col-btn" onclick="openAddStatus('todo')">+ เพิ่มงาน</button>
  </div>
  <div class="col col-doing">
    <div class="col-header">
      <div class="col-label"><span class="col-dot dot-doing"></span>กำลังทำ</div>
      <span class="col-count" id="c2">0</span>
    </div>
    <div id="k2"></div>
    <button class="add-col-btn" onclick="openAddStatus('doing')">+ เพิ่มงาน</button>
  </div>
  <div class="col col-done">
    <div class="col-header">
      <div class="col-label"><span class="col-dot dot-done"></span>เสร็จแล้ว</div>
      <span class="col-count" id="c3">0</span>
    </div>
    <div id="k3"></div>
    <button class="add-col-btn" onclick="openAddStatus('done')">+ เพิ่มงาน</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeM()">
  <div class="modal">
    <div class="modal-title" id="mtitle">เพิ่มงานใหม่</div>
    <div class="form-group">
      <label class="form-label">ชื่องาน *</label>
      <input type="text" id="fn" placeholder="ระบุชื่องาน..." />
    </div>
    <div class="form-group">
      <label class="form-label">รายละเอียด</label>
      <textarea id="fd" placeholder="รายละเอียดเพิ่มเติม..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">สถานะ</label>
        <select id="fs">
          <option value="todo">รอดำเนินการ</option>
          <option value="doing">กำลังทำ</option>
          <option value="done">เสร็จแล้ว</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select id="fpr">
          <option value="medium">กลาง</option>
          <option value="high">สูง</option>
          <option value="low">ต่ำ</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">ผู้รับผิดชอบ</label>
        <input type="text" id="fass" placeholder="ชื่อผู้รับผิดชอบ" />
      </div>
      <div class="form-group">
        <label class="form-label">กำหนดส่ง</label>
        <input type="date" id="fdue" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="bdel" onclick="delTask()" style="display:none">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="1,3 12,3"/><path d="M4,3V2a1,1 0 0,1 1-1h3a1,1 0 0,1 1,1v1"/><path d="M2,3l.7,8a1,1 0 0,0 1,.9h5.6a1,1 0 0,0 1-.9L11,3"/></svg>
        ลบงาน
      </button>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn" onclick="closeM()">ยกเลิก</button>
        <button class="btn btn-primary" onclick="saveTask()">บันทึก</button>
      </div>
    </div>
  </div>
</div>

<script>
let tasks = [
  {id:1,name:'วางแผน Sprint ใหม่',desc:'กำหนดเป้าหมายและแบ่งงานทีม',status:'todo',priority:'high',assignee:'สมชาย',due:'2026-06-05'},
  {id:2,name:'ออกแบบ UI หน้า Dashboard',desc:'Wireframe และ mockup ทั้งหมด',status:'doing',priority:'high',assignee:'มาลี',due:'2026-06-03'},
  {id:3,name:'เขียน Unit Test',desc:'ครอบคลุม core logic',status:'doing',priority:'medium',assignee:'สมชาย',due:'2026-06-10'},
  {id:4,name:'ประชุม Standup',desc:'',status:'done',priority:'low',assignee:'มาลี',due:'2026-05-30'},
  {id:5,name:'ส่งรายงานประจำเดือน',desc:'',status:'done',priority:'medium',assignee:'วิชัย',due:'2026-05-31'},
  {id:6,name:'Review Pull Request',desc:'',status:'todo',priority:'medium',assignee:'วิชัย',due:'2026-06-02'},
];
let nid = 7, eid = null;

const AVC = [
  ['#DDE5FF','#1C3ECC'],['#D5F0E6','#1B6B45'],['#FFF0D5','#A05C10'],
  ['#F5D5E8','#8B2360'],['#D5EAF8','#0F4A8A'],['#F0D5FF','#6B2E9E']
];
function avc(n) {
  if (!n) return AVC[0];
  let h = 0; for (let c of n) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return AVC[h % AVC.length];
}
function ini(n) {
  if (!n) return '?';
  const p = n.trim().split(' ');
  return p.length >= 2 ? (p[0][0]+p[1][0]).toUpperCase() : n.slice(0,2).toUpperCase();
}
function fmtd(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${parseInt(day)} ${['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][parseInt(m)-1]}`;
}
function isOD(d) { return d && new Date(d) < new Date('2026-06-01'); }

function render() {
  const fp = document.getElementById('fp').value;
  const fa = document.getElementById('fa').value;
  const vis = tasks.filter(t => (!fp || t.priority===fp) && (!fa || t.assignee===fa));
  [['todo','k1','c1'],['doing','k2','c2'],['done','k3','c3']].forEach(([st,kid,cid]) => {
    const items = vis.filter(t => t.status===st)
      .sort((a,b) => {
        if (!a.due && !b.due) return 0;
        if (!a.due) return 1;
        if (!b.due) return -1;
        return b.due.localeCompare(a.due); // วันล่าสุดขึ้นก่อน
      });
    document.getElementById(cid).textContent = items.length;
    const el = document.getElementById(kid);
    if (!items.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">○</div>ยังไม่มีงาน</div>';
      return;
    }
    el.innerHTML = items.map(t => {
      const [bg,col] = avc(t.assignee);
      const ov = t.status!=='done' && isOD(t.due);
      const plab = t.priority==='high'?'สูง':t.priority==='low'?'ต่ำ':'กลาง';
      const pcls = `p-${t.priority}`;
      return `<div class="task-card" onclick="openEdit(${t.id})">
        <div class="task-card-top">
          <div class="task-name">${t.name}</div>
          <span class="priority ${pcls}">${plab}</span>
        </div>
        ${t.desc ? `<div class="task-desc">${t.desc}</div>` : ''}
        <div class="task-meta">
          <div class="task-assignee">
            ${t.assignee ? `<div class="avatar" style="background:${bg};color:${col}">${ini(t.assignee)}</div><span class="assignee-name">${t.assignee}</span>` : ''}
          </div>
          ${t.due ? `<span class="task-due${ov?' overdue':''}">${ov?'⚠ ':''}${fmtd(t.due)}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  });
  document.getElementById('st').textContent = tasks.length;
  document.getElementById('s1').textContent = tasks.filter(t=>t.status==='todo').length;
  document.getElementById('s2').textContent = tasks.filter(t=>t.status==='doing').length;
  document.getElementById('s3').textContent = tasks.filter(t=>t.status==='done').length;

  // update assignee filter
  const sel = document.getElementById('fa'), cur = sel.value;
  const names = [...new Set(tasks.map(t=>t.assignee).filter(Boolean))];
  sel.innerHTML = '<option value="">ทุก Assignee</option>' + names.map(n=>`<option${n===cur?' selected':''}>${n}</option>`).join('');
}

function openAdd() { openAddStatus('todo'); }
function openAddStatus(st) {
  eid = null;
  document.getElementById('mtitle').textContent = 'เพิ่มงานใหม่';
  document.getElementById('fn').value = '';
  document.getElementById('fd').value = '';
  document.getElementById('fs').value = st;
  document.getElementById('fpr').value = 'medium';
  document.getElementById('fass').value = '';
  document.getElementById('fdue').value = '';
  document.getElementById('bdel').style.display = 'none';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('fn').focus(), 50);
}
function openEdit(id) {
  eid = id;
  const t = tasks.find(x=>x.id===id);
  document.getElementById('mtitle').textContent = 'แก้ไขงาน';
  document.getElementById('fn').value = t.name;
  document.getElementById('fd').value = t.desc||'';
  document.getElementById('fs').value = t.status;
  document.getElementById('fpr').value = t.priority;
  document.getElementById('fass').value = t.assignee||'';
  document.getElementById('fdue').value = t.due||'';
  document.getElementById('bdel').style.display = 'inline-flex';
  document.getElementById('modal').classList.add('open');
}
function closeM() { document.getElementById('modal').classList.remove('open'); }
function saveTask() {
  const n = document.getElementById('fn').value.trim();
  if (!n) { document.getElementById('fn').focus(); document.getElementById('fn').style.borderColor='var(--red)'; return; }
  document.getElementById('fn').style.borderColor='';
  const d = {
    name: n,
    desc: document.getElementById('fd').value.trim(),
    status: document.getElementById('fs').value,
    priority: document.getElementById('fpr').value,
    assignee: document.getElementById('fass').value.trim(),
    due: document.getElementById('fdue').value,
  };
  if (eid) { const i = tasks.findIndex(t=>t.id===eid); tasks[i] = {...tasks[i],...d}; }
  else tasks.push({ id: nid++, ...d });
  closeM(); render();
}
function delTask() {
  if (!eid) return;
  if (!confirm('ลบงานนี้?')) return;
  tasks = tasks.filter(t=>t.id!==eid);
  closeM(); render();
}
document.getElementById('fp').onchange = render;
document.getElementById('fa').onchange = render;
document.addEventListener('keydown', e => { if (e.key==='Escape') closeM(); });
render();
</script>
</body>
